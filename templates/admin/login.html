<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - {{ settings.blog_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <h1 class="login-title">🔐 管理员登录</h1>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}" style="position: static; margin-bottom: 16px; max-width: none;">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="/blogadmin">
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-input" placeholder="请输入管理员密码" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">登录</button>
            </form>
        </div>
    </div>

    <script>
    setTimeout(function() {
        document.querySelectorAll('.flash').forEach(function(el) {
            el.style.opacity = '0';
            setTimeout(function() { el.remove(); }, 300);
        });
    }, 3000);
    </script>
</body>
</html>
