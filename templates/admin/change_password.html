{% extends "base.html" %}

{% block title %}修改密码 - {{ settings.blog_name }}{% endblock %}

{% block body %}
<div class="admin-layout">
    <nav class="admin-nav">
        <span class="admin-nav-brand">{{ settings.blog_name }}</span>
        <div class="admin-nav-links">
            <a href="/blogadmin/dashboard">🏠 首页</a>
            <a href="/blogadmin/articles">📝 文章</a>
            <a href="/">🌐 前台</a>
            <a href="/blogadmin/logout">🚪 退出</a>
        </div>
    </nav>

    <div class="admin-content">
        <h1 class="admin-page-title">🔑 修改密码</h1>

        {% if is_first %}
        <div class="first-run-notice">
            ⚠️ 首次登录，请立即修改默认密码！
        </div>
        {% endif %}

        <div class="form-card">
            <form method="POST">
                <div class="form-group">
                    <label class="form-label">当前密码</label>
                    <input type="password" name="current_password" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <input type="password" name="new_password" class="form-input" minlength="6" required>
                    <p class="form-hint">至少6位</p>
                </div>

                <div class="form-group">
                    <label class="form-label">确认新密码</label>
                    <input type="password" name="confirm_password" class="form-input" minlength="6" required>
                </div>

                <button type="submit" class="btn btn-primary">💾 修改密码</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
