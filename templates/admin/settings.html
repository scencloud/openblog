{% extends "base.html" %}

{% block title %}站点设置 - {{ settings.blog_name }}{% endblock %}

{% block body %}
<div class="admin-layout">
    <nav class="admin-nav">
        <span class="admin-nav-brand">{{ settings.blog_name }}</span>
        <div class="admin-nav-links">
            <a href="/blogadmin/dashboard">🏠 首页</a>
            <a href="/blogadmin/articles">📝 文章</a>
            <a href="/">🌐 前台</a>
            <a href="/blogadmin/logout">🚪 退出</a>
        </div>
    </nav>

    <div class="admin-content">
        <h1 class="admin-page-title">⚙️ 站点设置</h1>

        <div class="form-card">
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="form-label">博客名称</label>
                    <input type="text" name="blog_name" class="form-input" value="{{ settings.blog_name }}" maxlength="100" required>
                    <p class="form-hint">显示在首页顶部和浏览器标题（1-100字符）</p>
                </div>

                <div class="form-group">
                    <label class="form-label">署名</label>
                    <input type="text" name="subtitle" class="form-input" value="{{ settings.subtitle }}" maxlength="50">
                    <p class="form-hint">一句话描述，显示在博客名称下方（最多50字）</p>
                </div>

                <div class="form-group">
                    <label class="form-label">Logo</label>
                    <input type="file" name="logo" accept="image/jpeg,image/png" class="form-input">
                    <p class="form-hint">支持 jpg/jpeg/png 格式，建议正方形图片</p>
                    {% if settings.logo %}
                    <div style="margin-top: 8px;">
                        <img src="/{{ settings.logo }}" style="max-width: 80px; border-radius: 50%;">
                    </div>
                    {% endif %}
                </div>

                <button type="submit" class="btn btn-primary">💾 保存设置</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
